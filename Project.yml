name: Prosciutto
options:
  bundleIdPrefix: app.prosciutto
  deploymentTarget: { macOS: "14.0" }
packages:
  ProsciuttoKit: { path: . }
targets:
  Prosciutto:
    type: application
    platform: macOS
    sources: [App/Prosciutto]
    dependencies:
      - package: ProsciuttoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.prosciutto.Prosciutto
        MARKETING_VERSION: "0.4.1"
        CURRENT_PROJECT_VERSION: "7"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Prosciutto contributors"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Prosciutto uses automation to open a recording's trim controls in QuickTime Player."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  ProsciuttoTests:
    type: bundle.unit-test
    platform: macOS
    sources: [App/ProsciuttoTests]
    dependencies:
      - target: Prosciutto
      - package: ProsciuttoKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
schemes:
  Prosciutto:
    build:
      targets:
        Prosciutto: all
        ProsciuttoTests: [test]
    test:
      targets:
        - ProsciuttoTests
